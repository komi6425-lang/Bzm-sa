<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BZM — Card Store</title>
  <link rel="stylesheet" href="styles.css" />

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

  <header class="top">
    <div class="lang-wrap">
      <select id="lang-select"></select>
    </div>
    <h1 id="app-title">BZM</h1>
    
  </header>

  <main>
    <!-- Auth / Store -->
    <section id="auth-screen" class="screen">
      <h2 id="txt-login" data-i18n="login.title">Login</h2>
      <input id="login-email" data-i18n-placeholder="login.email" placeholder="" type="email">
      <input id="login-pass" data-i18n-placeholder="login.password" placeholder="" type="password">
      <button id="login-btn" class="btn"><span data-i18n="login.button"></span></button>

      <hr>

      <h2 id="txt-create" data-i18n="create.title">Create Account (Buy card)</h2>
      <label class="label" id="txt-choose" data-i18n="create.choose">Choose card type</label>
      <select id="selected-card">
        <!-- options will be set dynamically by app.js -->
      </select>

      <input id="reg-name" placeholder="Full Name">
      <input id="reg-email" data-i18n-placeholder="login.email" placeholder="" type="email">
      <input id="reg-pass" data-i18n-placeholder="login.password" placeholder="" type="password">
      <input id="reg-ref" placeholder="Referral Code (required to buy)">

      
      <input id="reg-redotpay" type="text" placeholder="RedotPay ID">
<label class="label"><input type="checkbox" id="terms-checkbox"> I agree to the following terms:<br>You must pay to this RedotPay ID : <strong>1394812717</strong><br>If you do not pay the exact amount, your request will be rejected and the account will not be created</label><div id="paypal-area" class="hidden" style="max-width:400px;margin:10px auto;text-align:center;">
        <div id="paypal-button-container" class="hidden" style="max-width:360px;margin:10px auto;"></div>
      </div>

      <button id="pay-btn" class="btn primary">Create Request</button>
    </section>

    <!-- User Dashboard -->
    <section id="user-screen" class="screen hidden">
      <h2 id="txt-user-dashboard" data-i18n="dashboard.title">User Dashboard</h2>
      <div id="user-panel">
        <p id="user-info"></p>
        <p id="user-referrals"></p>
        <p id="txt-refcode" data-i18n="dashboard.refcode">Your referral code: <strong id="user-refcode"></strong></p>
        <p id="user-price"></p>
        <p id="user-bonus"></p>
      </div>

      <h3 id="txt-your-cards" data-i18n="dashboard.cards">Your Cards</h3>
      <div id="user-cards" class="cards-grid"></div>

      <div class="actions">
        <button id="logout-btn" class="btn"><span data-i18n="dashboard.logout"></span></button>
      </div>
    </section>

    <!-- Admin Panel (hidden) -->
    <section id="admin-screen" class="screen hidden">
      <h2 id="txt-admin-panel" data-i18n="admin.title">Admin Panel</h2>

      <div class="admin-grid">
        <div>
          <h3 id="txt-prices" data-i18n="admin.prices">Prices</h3>
          <input id="price-diamond" type="number" placeholder="Diamond Price">
          <input id="price-gold" type="number" placeholder="Gold Price">
          <input id="price-silver" type="number" placeholder="Silver Price">
        </div>

        <div>
          <h3 id="txt-bonuses" data-i18n="admin.bonuses">Bonuses (amount)</h3>
          <input id="bonus-diamond" type="number" placeholder="Diamond Bonus">
          <input id="bonus-gold" type="number" placeholder="Gold Bonus">
          <input id="bonus-silver" type="number" placeholder="Silver Bonus">
        </div>

        <div>
          <h3 id="txt-paypal" data-i18n="admin.paypal">PayPal</h3>
          <input id="paypal-client" placeholder="PayPal Client ID / Email">
          <input id="paypal-silver-url" placeholder="PayPal Silver URL">
          <input id="paypal-gold-url" placeholder="PayPal Gold URL">
          <input id="paypal-diamond-url" placeholder="PayPal Diamond URL">

        </div>
      </div>

      <button id="save-admin" class="btn primary">Save Settings</button>

      <hr>

      <h3 id="txt-create-free" data-i18n="admin.createFree">Create Free User & Grant N Cards</h3>
      <input id="admin-free-name" placeholder="Full Name">
      <input id="admin-free-email" data-i18n-placeholder="login.email" placeholder="" type="email">
      <input id="admin-free-pass" placeholder="Password (optional)">
      <label class="label">Card type</label>
      <select id="admin-free-card">
        <option value="diamond">Diamond</option>
        <option value="gold">Gold</option>
        <option value="silver">Silver</option>
      </select>
      <input id="admin-free-count" type="number" value="5" min="1" placeholder="Number of cards">
      <button id="admin-create-free" class="btn">Create user & Grant cards</button>

      <h3 id="txt-gen-existing" data-i18n="admin.generateExisting">Generate Cards for Existing User</h3>
      <input id="gen-email" placeholder="User email">
      <select id="gen-type">
        <option value="diamond">Diamond</option>
        <option value="gold">Gold</option>
        <option value="silver">Silver</option>
      </select>
      <input id="gen-count" type="number" value="5">
      <button id="gen-btn" class="btn">Generate Codes</button>

      <hr>

      <h3>Pending Orders</h3><div id="orders-box"></div>
      <hr>
      <h3 id="txt-pending" data-i18n="admin.pendingBonus">Pending Bonus Requests</h3>
      <div id="bonus-requests"></div>

      <hr>

      <h3>Referral Reward Requests</h3>
      <div id="reward-requests"></div>
      <hr>

      <h3 id="txt-users-codes" data-i18n="admin.usersCodes">Users & Codes</h3>
      <div id="users-codes"></div>

      <div class="actions">
        <button id="admin-logout" class="btn">Close Admin</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small id="txt-footer" data-i18n="footer.copyright">© BZM</small>
  </footer>

<script src="i18n-loader.js"></script>
<script src="app.js"></script>
</body>
</html>
